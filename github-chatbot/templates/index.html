<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Chatbot</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="chat-container">
        <h1>GitHub Chatbot</h1>
        <div id="chat-box" class="chat-box"></div>
        <div class="input-area">
            <input type="password" id="token-input" placeholder="GitHub Token (optional, loaded from .env)" autocomplete="off" />
            <input type="text" id="user-input" placeholder="Ask me anything about GitHub..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script>
        async function sendMessage() {
            const tokenInput = document.getElementById('token-input');
            const userInput = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');

            if (!userInput || !chatBox) {
                return;
            }

            const message = userInput.value.trim();
            if (!message) {
                return;
            }

            const userMsg = document.createElement('div');
            userMsg.className = 'user-message';
            userMsg.textContent = message;
            chatBox.appendChild(userMsg);
            userInput.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        token: tokenInput ? tokenInput.value : ''
                    })
                });
                const data = await response.json();
                const botMsg = document.createElement('div');
                botMsg.className = 'bot-message';
                botMsg.textContent = data.message;
                chatBox.appendChild(botMsg);
            } catch (err) {
                const errMsg = document.createElement('div');
                errMsg.className = 'bot-message';
                errMsg.textContent = 'Error: Could not reach the server.';
                chatBox.appendChild(errMsg);
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
