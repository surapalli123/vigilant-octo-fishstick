<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Chatbot</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="chat-container">
        <h1>GitHub Chatbot</h1>
        <div id="chat-box" class="chat-box"></div>
        <div class="input-area">
            <input type="password" id="token-input" placeholder="Enter your GitHub Token" autocomplete="off" />
            <input type="text" id="user-input" placeholder="Ask me anything about GitHub..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script>
        function sendMessage() {
            const tokenInput = document.getElementById('token-input');
            const userInput = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');

            if (!userInput || !chatBox) {
                return;
            }

            const message = userInput.value.trim();
            if (!message) {
                return;
            }

            const messageElement = document.createElement('div');
            messageElement.className = 'user-message';
            messageElement.textContent = message;

            chatBox.appendChild(messageElement);
            userInput.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
